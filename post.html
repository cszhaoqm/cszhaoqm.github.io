<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>文章</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.min.css">
  <style>
    body { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    nav a { margin-right: 1rem; }
    .markdown-body { box-sizing: border-box; min-width: 200px; max-width: 800px; margin: 0 auto; }
  </style>
</head>
<body>
  <nav>
    <a href="/">首页</a>
    <a href="/posts.html">Blog</a>
    <a href="/about.md">About me</a>
  </nav>

  <div id="content" class="markdown-body"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // 从 URL 参数获取 md 文件路径
    const urlParams = new URLSearchParams(window.location.search);
    const mdFile = urlParams.get('file') || 'about.md';

    fetch(mdFile)
      .then(res => res.text())
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
        document.title = document.querySelector('h1')?.textContent || '文章';
      })
  </script>
</body>
</html>
